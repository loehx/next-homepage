[build]
command = "npm run build"
publish = "out"
functions = "netlify/functions"

[build.environment]
NETLIFY_NEXT_PLUGIN_SKIP = "true"
NODE_VERSION = "22"

[dev]
command = "yarn dev:next"
targetPort = 3000
port = 8888
publish = "out"
autoLaunch = false

[[redirects]]
from = "/api/ai/*"
to = "/.netlify/functions/ai-:splat"
status = 200

# Public, read-only project/company/technology catalog consumed by the
# homepage-agent (and any future external integration). Generated at build
# time by `yarn build:agent-api` → public/api/v1/*.json, so it ships as a
# flat CDN asset. CORS is open because the data is already public via the site.
[[headers]]
for = "/api/v1/*"
[headers.values]
Access-Control-Allow-Origin = "*"
Cache-Control = "public, max-age=300, s-maxage=3600, stale-while-revalidate=86400"
Content-Type = "application/json; charset=utf-8"
